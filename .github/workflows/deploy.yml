name: Deploy to cPanel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create service-account.json
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT }}' > service-account.json

      - name: Create config.local.php
        run: |
          printf '<?php\ndefine("GEMINI_API_KEY", "%s");\n' '${{ secrets.GEMINI_API_KEY }}' > config.local.php

      - name: Create stock-analyzer config.local.php
        run: |
          printf '<?php\ndefine("TELEGRAM_BOT_TOKEN", "%s");\ndefine("TELEGRAM_CHAT_ID", "%s");\ndefine("LINE_CHANNEL_TOKEN", "%s");\ndefine("LINE_USER_ID", "%s");\ndefine("ALERT_EMAIL", "%s");\n' '${{ secrets.TELEGRAM_BOT_TOKEN }}' '${{ secrets.TELEGRAM_CHAT_ID }}' '${{ secrets.LINE_CHANNEL_TOKEN }}' '${{ secrets.LINE_USER_ID }}' '${{ secrets.ALERT_EMAIL }}' > stock-analyzer/config.local.php

      - name: Ensure stock-analyzer directories are writable
        run: |
          mkdir -p stock-analyzer/data stock-analyzer/cache
          chmod 777 stock-analyzer/data stock-analyzer/cache

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ${{ secrets.FTP_TARGET_DIR }}
          exclude: |
            .git/**
            .gitignore
            .github/**
            src/**
          delete: false

      - name: Clear OPcache
        run: |
          curl -s "https://bigt.cc/sleeping-beauty/api.php?action=clear-opcache&token=sb-cron-2026-rebuild"
